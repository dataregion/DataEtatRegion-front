run-tests-e2e:
  stage: 🧪 post-deploy tests
  image: mcr.microsoft.com/playwright:v1.59.1@sha256:b0ab6f3cb99aa7803adbc14d9027ec1785fc6e433b97e134e0f8fe61683b6b53
  script:
    - cd e2e/
    - npm ci
    - export TEST_USERNAME=${TEST_USERNAME}
    - export TEST_PASSWORD=${TEST_PASSWORD}
    - export TEST_USERNAME_ADMIN=${TEST_USERNAME_ADMIN}
    - export TEST_PASSWORD_ADMIN=${TEST_PASSWORD_ADMIN}
    - export BUDGET_BRETAGNE_BASE_URL="https://budget-bretagne.nocode.csm.ovh" 
    - npx playwright test
  artifacts:
    expire_in: 3 days
    when: always
    paths:
      - e2e/playwright-report/*
      - e2e/test-results/*
      - test-results/*
      - playwright-report/*
  needs:
    - job: "🐣 deploy fronts on integration"
      optional: true
  rules:
    - if: '$DO_INTEG_TESTS == "✅"'
    - if: '$DO_INTEG_TESTS == "⚙️"'
      when: manual
    - when: never