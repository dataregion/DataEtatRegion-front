"🔨 build angular apps":
  image: node:24.14.1@sha256:80fc934952c8f1b2b4d39907af7211f8a9fff1a4c2cf673fb49099292c251cec
  stage: 🔨 build

  cache:
    key:
      files:
        - package-lock.json
        - package.json
    paths:
      - node_modules/
    policy: pull-push

  before_script:
    - |
      set -x
      if [ ! -d "./node_modules" ]; then
        echo >&2 'node_modules cache not available. run ci.'
        npm ci --prefer-offline --quiet
      fi

  script:
    - |
      npm run lint

      echo >&2 "🔨 Building budget-dataetat-dev"
      npm run build:budget-dev

      echo >&2 "🔨 Building budget-dataetat"
      npm run build:budget

      echo >&2 "🔨 Building france-relance"
      npm run build:france-relance

      echo >&2 "🔨 Building data-qpv"
      npm run build:data-qpv

      set +x

  artifacts:
    expire_in: 30 mins
    paths:
      - dist/

  rules:
    - if: '$DO_BUILD == "✅"'
    - if: '$DO_BUILD == "⚙️"'
      when: manual
    - when: never